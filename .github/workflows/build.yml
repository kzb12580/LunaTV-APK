name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build All APKs
      run: ./gradlew assembleDebug assembleRelease

    - name: Upload LunaTV APK
      uses: actions/upload-artifact@v4
      with:
        name: LunaTV-APK
        path: |
          app/build/outputs/apk/lunatv/debug/*.apk
          app/build/outputs/apk/lunatv/release/*.apk

    - name: Upload MoonTV APK
      uses: actions/upload-artifact@v4
      with:
        name: MoonTV-APK
        path: |
          app/build/outputs/apk/moontv/debug/*.apk
          app/build/outputs/apk/moontv/release/*.apk

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          app/build/outputs/apk/lunatv/debug/*.apk
          app/build/outputs/apk/lunatv/release/*.apk
          app/build/outputs/apk/moontv/debug/*.apk
          app/build/outputs/apk/moontv/release/*.apk
